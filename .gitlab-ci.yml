stages:
  - test
  - test_isotovideo

.common_before_script:
  before_script:
    - zypper --non-interactive install perl-Inline-Python python3-requests python3-beautifulsoup4
    - python3 utils/download_image.py --$IMAGE_VERSION

.openqa-cli_base:
  stage: test
  tags:
    - LinuxHighMemory
  allow_failure: true
  when: manual
  image:
    name: registry.opensuse.org/devel/openqa/containers/openqa-single-instance:latest
    entrypoint: ["/bin/bash", "-c"]
  after_script:
    - .gitlab/scripts/collect_results.sh
  artifacts:
    when: always
    paths:
      - testresults/

.isotovideo_base:
  stage: test_isotovideo
  tags:
    - LinuxHighMemory
  allow_failure: false
  when: manual
  image:
    name: registry.opensuse.org/devel/openqa/containers/isotovideo:qemu-x86
    entrypoint: ["/bin/bash", "-c"]
  after_script:
    - .gitlab/scripts/isotovideo/collect_results.sh
  artifacts:
    when: always
    paths:
      - reports/

testing-latest-build:
  extends:
    - .openqa-cli_base
    - .common_before_script
  variables:
    IMAGE_VERSION: latest
  script:
    - .gitlab/scripts/latest_build_test.sh

testing-upgrade:
  extends:
    - .openqa-cli_base
    - .common_before_script
  variables:
    IMAGE_VERSION: previously-success
  script:
    - .gitlab/scripts/upgrade_test.sh

testing-latest-build-isotovideo:
  extends:
    - .isotovideo_base
    - .common_before_script
  variables:
    IMAGE_VERSION: latest
  script:
    - .gitlab/scripts/isotovideo/latest_build_test.sh

testing-upgrade-isotovideo:
  extends:
    - .isotovideo_base
    - .common_before_script
  variables:
    IMAGE_VERSION: previously-success
  script:
    - .gitlab/scripts/isotovideo/upgrade_test.sh