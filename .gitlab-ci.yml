include:
  - project: sysadmin/ci-utilities
    file:
      - /gitlab-templates/reuse-lint.yml
      - /gitlab-templates/blocks/workflow.yml

stages:
  - validate
  - test
  - test-upgrade

# Don't run linting when triggered from kde-linux CI
reuse:
  rules:
    - if: $CI_PIPELINE_SOURCE == "trigger"
      when: never
    - when: always

.test-base:
  needs: []
  image: storage.kde.org/vm-images/image-builder
  tags:
    - VM
    - amd64
  variables:
    OPENQA_HOST_ADDR: openqa.kde-linux.haraldsitter.eu
  rules:
    - if: $CI_PIPELINE_SOURCE == "trigger"
      when: always
    - if: $CI_MERGE_REQUEST_IID
      when: manual
    - when: always
  allow_failure: false
  script:
    - >
      podman run --rm
      --device /dev/kvm
      --entrypoint ""
      --volume $CI_PROJECT_DIR:$CI_PROJECT_DIR:z
      --workdir $CI_PROJECT_DIR
      --env OPENQA_HOST_ADDR
      --env OPENQA_API_KEY
      --env OPENQA_API_SECRET
      --env IMAGE_URL
      registry.opensuse.org/devel/openqa/containers16.0/openqa_worker:latest
      bash worker.sh $WORKER_ARGS

test:
  extends: .test-base
  stage: test

test-upgrade:
  extends: .test-base
  stage: test-upgrade
  variables:
    WORKER_ARGS: --upgrade
