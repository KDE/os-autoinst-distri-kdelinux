include:
  - project: sysadmin/ci-utilities
    file:
      - /gitlab-templates/reuse-lint.yml
      - /gitlab-templates/blocks/workflow.yml

stages:
  - validate
  - test
  - test-upgrade

# Don't run linting when triggered from kde-linux CI
reuse:
  rules:
    - if: $CI_PIPELINE_SOURCE == "trigger"
      when: never
    - when: always

.test-base:
  variables:
    OPENQA_HOST_ADDR: openqa.kde-linux.haraldsitter.eu
    OPENQA_SSH_USER: root
  tags:
    - LargeVM
    - amd64
  rules:
    - if: $CI_PIPELINE_SOURCE == "trigger"
      when: always
    - if: $CI_MERGE_REQUEST_IID
      when: manual
    - when: always
  allow_failure: false
  image:
    name: registry.opensuse.org/devel/openqa/containers16.0/openqa_worker:latest
    entrypoint: [""]

test:
  extends: .test-base
  stage: test
  script:
    - bash worker.sh

test-upgrade:
  extends: .test-base
  stage: test-upgrade
  script:
    - bash worker.sh --upgrade
