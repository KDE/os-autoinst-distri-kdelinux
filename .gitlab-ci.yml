stages:
- test

test-latest-image-opensuse:
  stage: test
  tags:
    - kde-linux-image+test-x86_64
  allow_failure: false
  when: manual
  image:
    name: opensuse/tumbleweed:latest
  before_script:
    # Install dependencies
    - zypper --non-interactive install openQA-bootstrap perl-Inline-Python python3-requests python3-beautifulsoup4
    # Bootstrap OpenQA Environment
    - .gitlab/scripts/openqa-bootstrap.sh
    # Download the latest image
    - python3 utils/download_image.py
  script:
    - .gitlab/scripts/openqa_test.sh